version: '3'

services:
  app:
    build: .
    ports:
      # :3900 optional ports
      - 3900:3900
    depends_on:
      - mongodb

  mongodb:
    image: mongo:6
    ports:
      # :27017 Mongo port, do not change!
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=mongo
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express
    ports:
      - 9800:8081
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=mongo
      - ME_CONFIG_MONGODB_SERVER=mongodb

volumes:
  mongo-data:
