<!DOCTYPE html>
<html>
<head>
  <title>MongoDB CRUD</title>
</head>
<body>

<h2>Vytvořit uživatele</h2>

<input id="name" placeholder="Jméno">
<input id="age" placeholder="Věk">
<button onclick="createUser()">Vytvořit</button>

<h2>Seznam</h2>
<div id="users"></div>

<script>
async function createUser() {
  await fetch('/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: name.value,
      age: age.value
    })
  });

  loadUsers();
}

async function deleteUser(id) {
  await fetch('/users/' + id, { method: 'DELETE' });
  loadUsers();
}

async function updateUser(id) {
  const newName = prompt("Nové jméno:");
  const newAge = prompt("Nový věk:");

  await fetch('/users/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: newName, age: newAge })
  });

  loadUsers();
}

async function uploadImage(id, input) {
  const formData = new FormData();
  formData.append('image', input.files[0]);

  await fetch('/upload/' + id, {
    method: 'POST',
    body: formData
  });

  loadUsers();
}

async function loadUsers() {
  const res = await fetch('/users');
  const users = await res.json();

  const container = document.getElementById('users');
  container.innerHTML = '';

  users.forEach(u => {
    const div = document.createElement('div');

    div.innerHTML = `
      <hr>
      <b>${u.name}</b> (${u.age})
      <br>
      ${u.profileImage ? `<img src="${u.profileImage}" width="120"/>` : 'Bez obrázku'}
      <br><br>
      <button onclick="updateUser('${u._id}')">Edit</button>
      <button onclick="deleteUser('${u._id}')">Delete</button>
      <br>
      <input type="file" onchange="uploadImage('${u._id}', this)">
    `;

    container.appendChild(div);
  });
}

loadUsers();
</script>

</body>
</html>
