<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Mongo Picture Upload Demo</title>
</head>
<body>

  <h2>Uživatel</h2>

  <!-- FORM pro data -->
  <form id="profileForm">
    <input type="text" id="name" placeholder="Jméno" required>
    <br><br>
    <input type="number" id="age" placeholder="Věk" required>
    <br><br>
    <button type="submit">Uložit profil</button>
  </form>

  <h2>Upload obrázku</h2>

  <!-- FORM pro obrázek -->
  <form id="uploadForm" enctype="multipart/form-data">
    <input type="file" id="image" name="image" required>
    <br><br>
    <button type="submit">Nahrát obrázek</button>
  </form>

  <h2>Výsledek</h2>
  <pre id="output"></pre>

  <h2>Profilový obrázek</h2>
  <img id="preview" width="200"/>

  <script>
    const output = document.getElementById('output');
    const preview = document.getElementById('preview');

    // ===== ULOŽENÍ PROFILU =====
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        name: document.getElementById('name').value,
        age: document.getElementById('age').value
      };

      const res = await fetch('/update-profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      output.textContent = JSON.stringify(result, null, 2);
    });

    // ===== UPLOAD OBRÁZKU =====
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData();
      formData.append('image', document.getElementById('image').files[0]);

      const res = await fetch('/upload', {
        method: 'POST',
        body: formData
      });

      const result = await res.json();
      output.textContent = JSON.stringify(result, null, 2);

      // zobraz obrázek
      preview.src = result.path;
    });

    // ===== NAČTENÍ PROFILU =====
    async function loadProfile() {
      const res = await fetch('/get-profile');
      const data = await res.json();

      if (data.profileImage) {
        preview.src = data.profileImage;
      }

      output.textContent = JSON.stringify(data, null, 2);
    }

    loadProfile();
  </script>

</body>
</html>
